name: Test

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run tests
        shell: bash
        run: |
          npm test > /tmp/nanoswarm-test.log 2>&1
      - name: Upload test failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nanoswarm-test-failure
          path: /tmp/nanoswarm-test.log
          retention-days: 1
      - run: npm run build
