name: Test

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run tests
        shell: bash
        run: |
          if ! npm test > /tmp/nanoswarm-test.log 2>&1; then
            tail -n 200 /tmp/nanoswarm-test.log
            exit 1
          fi
      - run: npm run build
